server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/portal
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: portal
            client-secret: portal-secret
            authorization-grant-type: authorization_code
            scope: openid,profile,email
        provider:
          keycloak:
            issuer-uri: http://localhost:8081/realms/softmatrix

flowise:
  base-url: http://localhost:3000
  # 浏览器可达的设计器地址；生产环境与 base-url（内网）常常不同，缺省回落到 base-url
  designer-base-url: http://localhost:3000
  api-key: portal-flowise-key

keycloak:
  admin:
    base-url: http://localhost:8081
    realm: softmatrix
    client-id: portal-admin
    # 生产环境用环境变量覆盖;开发缺省值与 realm-export.json 一致
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:portal-admin-secret}

portal:
  bootstrap-admin-username: admin
